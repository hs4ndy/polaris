<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polaris — Live Infinite Flight Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Exo:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/globe.gl/dist/globe.gl.min.js"></script>

  <style>
    /* ── Reset ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design tokens ─────────────────────────────────────────────────────── */
    :root {
      --black:    #000000;
      --s1:       #0d0d0d;   /* OLED: #121212 standard, kept darker for purity */
      --s2:       #111111;
      --border:   #1e1e1e;
      --border2:  #2a2a2a;
      --text:     #f0f4f8;   /* 7:1+ contrast on #000 per skill recommendation */
      --text2:    #7a8694;
      --text3:    #3d4450;
      --accent:   #4f8ef7;
      --amber:    #f5a623;
      --purple:   #a855f7;
      --green:    #3fb950;
      --red:      #f85149;
      /* Glow values for OLED accent style */
      --glow-accent: rgba(79, 142, 247, 0.22);
      --glow-amber:  rgba(245, 166, 35, 0.22);
      --glow-purple: rgba(168, 85, 247, 0.22);
      --sidebar-w: 300px;
      --detail-w:  350px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--black);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      -webkit-font-smoothing: antialiased;
    }

    /* ── App shell: globe fills everything, sidebars float over it ─────────── */
    #app {
      position: relative;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* ════════════════════════════════════════════════════════════════════════
       LEFT SIDEBAR — Liquid glass panel floating over the globe
    ════════════════════════════════════════════════════════════════════════ */
    #left-sb {
      position: absolute;
      top: 12px;
      left: 12px;
      bottom: 12px;
      width: var(--sidebar-w);
      z-index: 20;

      /* Frosted glass */
      background: rgba(0, 0, 0, 0.44);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);

      /* Glass border — very subtle white rim */
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      overflow: hidden;

      /* Depth shadows + inner top-edge highlight */
      box-shadow:
        0 8px 48px rgba(0,0,0,0.65),
        inset 0 1px 0 rgba(255,255,255,0.11),
        inset 0 0 0 0.5px rgba(255,255,255,0.04);

      display: flex;
      flex-direction: column;
    }

    /* Prism light catch — rainbow edge at the very top of the glass */
    #left-sb::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1.5px;
      background: linear-gradient(90deg,
        rgba(79,142,247,0.55),
        rgba(139,92,246,0.65),
        rgba(56,189,248,0.5),
        rgba(52,211,153,0.4),
        rgba(251,191,36,0.35),
        rgba(239,68,68,0.25),
        transparent
      );
      border-radius: 14px 14px 0 0;
      pointer-events: none;
      z-index: 2;
    }

    /* Header */
    #sb-hdr {
      padding: 8px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    #logo {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Search */
    #sb-search {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .search-inner {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 6px;
      padding: 0 10px;
      gap: 7px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-inner:focus-within {
      border-color: rgba(79,142,247,0.45);
      box-shadow: 0 0 0 2px rgba(79,142,247,0.12);
    }
    .search-icon {
      flex-shrink: 0;
      color: var(--text3);
      font-size: 12px;
      pointer-events: none;
      padding-top: 1px;
    }
    #search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 8px 0;
    }
    #search-input::placeholder { color: var(--text3); }

    /* Server filter */
    #server-filter {
      display: flex;
      padding: 8px 10px;
      gap: 5px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .sf-btn {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 5px 0;
      border-radius: 5px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s, box-shadow 0.2s;
      letter-spacing: 0.03em;
    }
    .sf-btn:hover { color: var(--text2); background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.12); }
    .sf-btn.active[data-server="all"]      { background: rgba(79,142,247,0.14);  border-color: rgba(79,142,247,0.4);  color: var(--accent);  box-shadow: 0 0 12px rgba(79,142,247,0.2); }
    .sf-btn.active[data-server="expert"]   { background: rgba(79,142,247,0.14);  border-color: rgba(79,142,247,0.4);  color: var(--accent);  box-shadow: 0 0 12px rgba(79,142,247,0.2); }
    .sf-btn.active[data-server="training"] { background: rgba(245,166,35,0.12);  border-color: rgba(245,166,35,0.4);  color: var(--amber);   box-shadow: 0 0 12px rgba(245,166,35,0.2); }
    .sf-btn.active[data-server="casual"]   { background: rgba(168,85,247,0.12);  border-color: rgba(168,85,247,0.4);  color: var(--purple);  box-shadow: 0 0 12px rgba(168,85,247,0.2); }

    /* Count + speed toggle */
    #sb-meta {
      display: flex;
      align-items: center;
      padding: 7px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      gap: 6px;
      flex-shrink: 0;
      font-size: 11px;
      color: var(--text2);
    }
    #flight-count { font-weight: 700; color: var(--text); font-size: 12px; }
    #speed-btn {
      margin-left: auto;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    #speed-btn:hover { border-color: rgba(79,142,247,0.4); background: rgba(79,142,247,0.1); box-shadow: 0 0 10px rgba(79,142,247,0.18); }

    /* Flight list */
    #flight-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }
    #flight-list::-webkit-scrollbar       { width: 3px; }
    #flight-list::-webkit-scrollbar-track { background: transparent; }
    #flight-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .fl-item {
      padding: 9px 14px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }
    .fl-item:hover    { background: rgba(255,255,255,0.04); }
    .fl-item.selected {
      background: rgba(79,142,247,0.1);
      border-left: 2px solid var(--accent);
      padding-left: 12px;
      box-shadow: inset 4px 0 16px rgba(79,142,247,0.1);
    }
    .fl-item.selected::after {
      content: '';
      position: absolute;
      inset: 0;
      left: auto;
      width: 28px;
      background: linear-gradient(to left, #09152c, transparent);
      pointer-events: none;
    }

    /* Row 1: dot + callsign + server tag */
    .fl-r1 { display: flex; align-items: center; gap: 7px; }
    .fl-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .fl-cs {
      font-weight: 700;
      font-size: 13px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }
    .fl-stag {
      font-size: 8px;
      font-weight: 600;
      padding: 2px 5px;
      border-radius: 3px;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    /* Row 2: username */
    .fl-r2 {
      font-size: 11px;
      color: var(--text2);
      margin-top: 2px;
      padding-left: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Row 3: alt · spd · state */
    .fl-r3 {
      font-size: 11px;
      color: var(--text2);
      margin-top: 2px;
      padding-left: 13px;
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: nowrap;
    }
    .fl-alt { color: var(--text); font-weight: 600; }
    .fl-sep { color: var(--text3); }
    .s-badge {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      line-height: 1.5;
    }

    /* Empty / overflow */
    .fl-empty {
      padding: 36px 14px;
      text-align: center;
      font-size: 12px;
      color: var(--text3);
      letter-spacing: 0.04em;
    }
    .fl-overflow {
      padding: 8px 14px;
      text-align: center;
      font-size: 10px;
      color: var(--text3);
      border-top: 1px solid var(--border);
    }

    /* Beta footer */
    #sb-footer {
      padding: 8px 14px;
      border-top: 1px solid rgba(255,255,255,0.05);
      background: rgba(3,8,20,0.5);
      font-size: 9px;
      color: rgba(79,142,247,0.45);
      letter-spacing: 0.07em;
      flex-shrink: 0;
      text-align: center;
    }

    /* ════════════════════════════════════════════════════════════════════════
       GLOBE — fills full viewport so glass sidebars can blur it
    ════════════════════════════════════════════════════════════════════════ */
    #globe-wrap {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: #000;
    }

    /* Globe.gl fills the container */
    #globe-wrap canvas { display: block; }

    /* Drag hint */
    #globe-hint {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.07em;
      pointer-events: none;
      white-space: nowrap;
      opacity: 0.6;
      z-index: 5;
    }

    /* Version tag */
    #globe-ver {
      position: absolute;
      bottom: 10px;
      right: 12px;
      font-size: 9px;
      color: var(--text3);
      opacity: 0.4;
      pointer-events: none;
      letter-spacing: 0.06em;
      z-index: 5;
    }

    /* Loading overlay */
    #globe-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #000;
      z-index: 30;
      transition: opacity 0.7s ease;
    }
    #globe-loading.hidden { opacity: 0; pointer-events: none; }

    .load-rings {
      position: relative;
      width: 36px;
      height: 36px;
    }
    .load-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid transparent;
    }
    .load-ring:nth-child(1) {
      border-top-color: var(--accent);
      animation: spin 1.2s linear infinite;
    }
    .load-ring:nth-child(2) {
      inset: 6px;
      border-right-color: #2d4a7f;
      animation: spin 1.8s linear infinite reverse;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .load-txt {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.14em;
    }

    /* ════════════════════════════════════════════════════════════════════════
       RIGHT SIDEBAR — Liquid glass detail panel, floats over the globe
    ════════════════════════════════════════════════════════════════════════ */
    #right-sb {
      position: absolute;
      top: 12px;
      right: 12px;
      bottom: 12px;
      width: var(--detail-w);
      z-index: 20;
      display: flex;
      flex-direction: column;
      overflow: hidden;

      /* Frosted glass — mirrors left sidebar */
      background: rgba(0, 0, 0, 0.44);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      box-shadow:
        0 8px 48px rgba(0,0,0,0.65),
        inset 0 1px 0 rgba(255,255,255,0.11),
        inset 0 0 0 0.5px rgba(255,255,255,0.04);

      /* Slide in from right */
      transform: translateX(calc(100% + 24px));
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #right-sb.open {
      transform: translateX(0);
    }

    /* Prism edge — reversed spectrum, right-to-left */
    #right-sb::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1.5px;
      background: linear-gradient(90deg,
        transparent,
        rgba(239,68,68,0.25),
        rgba(251,191,36,0.35),
        rgba(52,211,153,0.4),
        rgba(56,189,248,0.5),
        rgba(139,92,246,0.65),
        rgba(79,142,247,0.55)
      );
      border-radius: 14px 14px 0 0;
      pointer-events: none;
      z-index: 2;
    }

    #detail-inner {
      width: 100%;
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0 0 32px;
    }
    #detail-inner::-webkit-scrollbar       { width: 3px; }
    #detail-inner::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    /* Detail header */
    #d-hdr {
      padding: 16px 16px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: relative;
    }
    #d-close {
      position: absolute;
      top: 14px;
      right: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text2);
      width: 26px;
      height: 26px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 12px;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    #d-close:hover { color: var(--text); border-color: rgba(255,255,255,0.18); background: rgba(255,255,255,0.1); }

    #d-callsign {
      font-family: 'Exo', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.03em;
      line-height: 1.1;
      padding-right: 36px;
      margin-bottom: 4px;
      text-shadow: 0 0 20px var(--glow-accent);
    }
    #d-user {
      font-size: 12px;
      color: var(--text2);
      min-height: 17px;
      margin-bottom: 10px;
    }
    #d-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    /* Data sections */
    .d-section {
      padding: 14px 16px 0;
    }
    .d-sec-label {
      font-size: 9px;
      color: var(--text3);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .d-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .dg-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 7px;
      padding: 9px 11px;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .dg-card:hover { border-color: rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); box-shadow: inset 0 1px 0 rgba(255,255,255,0.06); }
    .dg-lbl {
      font-size: 8px;
      color: var(--text3);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .dg-val {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }

    /* Server row */
    #d-server-row {
      padding: 12px 16px 0;
      font-size: 11px;
      color: var(--text2);
    }

    /* Mobile: globe already fills viewport, just hide the sidebars */
    @media (max-width: 768px) {
      #left-sb  { display: none; }
      #right-sb { display: none; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ══════════════ LEFT SIDEBAR ══════════════ -->
  <div id="left-sb">

    <!-- Brand header -->
    <div id="sb-hdr">
      <img id="logo" src="polaris-logo.png" alt="Polaris">
    </div>

    <!-- Search -->
    <div id="sb-search">
      <div class="search-inner">
        <span class="search-icon">
          <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="6.5" cy="6.5" r="4"/><line x1="10" y1="10" x2="14" y2="14"/>
          </svg>
        </span>
        <input id="search-input" type="text" placeholder="Search callsign or pilot…"
               oninput="filterSearch(this.value)" autocomplete="off" spellcheck="false">
      </div>
    </div>

    <!-- Server filter -->
    <div id="server-filter">
      <button class="sf-btn"        data-server="expert"   onclick="setFilter(this,'expert')">Expert</button>
      <button class="sf-btn"        data-server="training" onclick="setFilter(this,'training')">Training</button>
      <button class="sf-btn active" data-server="casual"   onclick="setFilter(this,'casual')">Casual</button>
    </div>

    <!-- Count + speed unit -->
    <div id="sb-meta">
      <span id="flight-count">0</span>
      <span style="color:var(--text3)">flights</span>
      <button id="speed-btn" onclick="cycleSpeed()">kn</button>
    </div>

    <!-- Flight list -->
    <div id="flight-list">
      <div class="fl-empty">Connecting…</div>
    </div>

    <!-- Beta footer -->
    <div id="sb-footer">Beta — expect bugs &nbsp;·&nbsp; v0.1.0</div>
  </div>

  <!-- ══════════════ GLOBE ══════════════ -->
  <div id="globe-wrap">
    <div id="globe-loading">
      <div class="load-rings">
        <div class="load-ring"></div>
        <div class="load-ring"></div>
      </div>
      <span class="load-txt">LOADING GLOBE…</span>
    </div>
    <div id="globe-hint">drag to rotate &nbsp;·&nbsp; scroll to zoom</div>
    <div id="globe-ver">v0.1.0</div>
  </div>

  <!-- ══════════════ RIGHT SIDEBAR (DETAIL) ══════════════ -->
  <div id="right-sb">
    <div id="detail-inner">

      <!-- Callsign / user / badges -->
      <div id="d-hdr">
        <button id="d-close" onclick="closeDetail()" aria-label="Close">✕</button>
        <div id="d-callsign">—</div>
        <div id="d-user"></div>
        <div id="d-badges"></div>
      </div>

      <!-- Navigation data -->
      <div class="d-section" style="margin-top:14px">
        <div class="d-sec-label">Navigation</div>
        <div class="d-grid">
          <div class="dg-card">
            <div class="dg-lbl">Altitude</div>
            <div class="dg-val" id="d-alt">—</div>
          </div>
          <div class="dg-card">
            <div class="dg-lbl">Speed</div>
            <div class="dg-val" id="d-spd">—</div>
          </div>
          <div class="dg-card">
            <div class="dg-lbl">Vert Speed</div>
            <div class="dg-val" id="d-vs">—</div>
          </div>
          <div class="dg-card">
            <div class="dg-lbl">Track</div>
            <div class="dg-val" id="d-trk">—</div>
          </div>
        </div>
      </div>

      <!-- Position data -->
      <div class="d-section" style="margin-top:12px">
        <div class="d-sec-label">Position</div>
        <div class="d-grid">
          <div class="dg-card">
            <div class="dg-lbl">Latitude</div>
            <div class="dg-val" id="d-lat">—</div>
          </div>
          <div class="dg-card">
            <div class="dg-lbl">Longitude</div>
            <div class="dg-val" id="d-lon">—</div>
          </div>
        </div>
      </div>

      <!-- Server -->
      <div id="d-server-row"></div>

    </div>
  </div>

</div><!-- #app -->

<script>
'use strict';

/* ── Config ─────────────────────────────────────────────────────────────────── */
const WS_URL = location.hostname === 'localhost'
  ? 'ws://localhost:3001'
  : 'wss://polaris-proxy-u3fw.onrender.com';

const SERVER_COLOR = {
  expert:   '#4f8ef7',
  training: '#f5a623',
  casual:   '#a855f7',
};

const FLIGHT_STATE = {
  0: { label: 'Unknown',   color: '#5a6270' },
  1: { label: 'Preflight', color: '#5a6270' },
  2: { label: 'Taxi',      color: '#f5a623' },
  3: { label: 'Takeoff',   color: '#4f8ef7' },
  4: { label: 'Cruise',    color: '#3fb950' },
  5: { label: 'Approach',  color: '#f5a623' },
  6: { label: 'Landing',   color: '#f85149' },
  7: { label: 'Parked',    color: '#5a6270' },
};

const STALE_MS  = 5 * 60 * 1000;
const TRAIL_MAX = 180;
const LIST_MAX  = 300;

/* ── State ──────────────────────────────────────────────────────────────────── */
const flightData     = {};
const liveTrails     = {};
const flightLastSeen = {};

let selectedId    = null;
let currentServer = 'casual';
let searchQuery   = '';
let speedUnit     = 'kn';
let globe         = null;
let isOnline      = false;

/* ── Utilities ──────────────────────────────────────────────────────────────── */
const esc = s => String(s || '')
  .replace(/&/g,'&amp;').replace(/</g,'&lt;')
  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const sColor = s => SERVER_COLOR[s] || '#5a6270';
const sState = n => FLIGHT_STATE[n] || FLIGHT_STATE[0];

function fmtSpeed(kn) {
  if (kn == null || isNaN(kn)) return '—';
  if (speedUnit === 'mph')  return Math.round(kn * 1.15078) + ' mph';
  if (speedUnit === 'km/h') return Math.round(kn * 1.852)   + ' km/h';
  return Math.round(kn) + ' kn';
}
function fmtAlt(ft) {
  if (ft == null) return '—';
  const n = Math.round(ft);
  if (n >= 18000) return 'FL' + Math.round(n / 100);
  return n.toLocaleString() + ' ft';
}
function fmtVS(vs) {
  if (vs == null) return '—';
  const n = Math.round(vs);
  return (n >= 0 ? '↑ ' : '↓ ') + Math.abs(n).toLocaleString() + ' fpm';
}


/* ── Globe init ─────────────────────────────────────────────────────────────── */
function initGlobe() {
  const el = document.getElementById('globe-wrap');

  globe = Globe()(el)
    .backgroundColor('#000000')
    .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
    .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
    .atmosphereColor('#2d5cb8')
    .atmosphereAltitude(0.14)
    // ── Flights as airplane HTML markers (flat on surface)
    .htmlElementsData([])
    .htmlLat(d => d.latitude)
    .htmlLng(d => d.longitude)
    .htmlAltitude(0)
    .htmlElement(d => {
      const col = sColor(d.server);
      const el = document.createElement('div');
      el.style.cssText = `color:${col};width:16px;height:16px;cursor:pointer;transform:rotate(${d.track||0}deg);filter:drop-shadow(0 0 3px ${col});`;
      el.innerHTML = '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>';
      el.onclick = () => selectFlight(String(d.flightId));
      return el;
    })
    // ── Trails as animated dashed paths
    .pathsData([])
    .pathPoints(d => d.coords)
    .pathPointLat(p => p[0])
    .pathPointLng(p => p[1])
    .pathColor(d => d.color)
    .pathStroke(0.45)
    .pathDashLength(0.05)
    .pathDashGap(0.03)
    .pathDashAnimateTime(24000)
    // ── Pulsing ring on selected flight
    .ringsData([])
    .ringLat(d => d.lat)
    .ringLng(d => d.lng)
    .ringColor(d => d.color)
    .ringMaxRadius(1.6)
    .ringPropagationSpeed(1.4)
    .ringRepeatPeriod(1300)
    .ringAltitude(0.002);

  globe.pointOfView({ lat: 25, lng: 15, altitude: 1.6 });

  window.addEventListener('resize', resizeGlobe);

  if (globe.onGlobeReady) globe.onGlobeReady(hideLoading);
  setTimeout(hideLoading, 2200);
}

function hideLoading() {
  document.getElementById('globe-loading')?.classList.add('hidden');
}

function resizeGlobe() {
  if (!globe) return;
  globe.width(window.innerWidth).height(window.innerHeight);
}

/* ── Globe data refresh ─────────────────────────────────────────────────────── */
function updateGlobe() {
  if (!globe) return;

  // Only show flights matching the active server filter
  const visible = Object.values(flightData).filter(f =>
    f.server === currentServer && f.latitude != null && f.longitude != null
  );
  globe.htmlElementsData(visible);

  const trails = Object.keys(liveTrails)
    .filter(id => liveTrails[id]?.length >= 2 && flightData[id] && flightData[id].server === currentServer)
    .map(id => ({ id, color: sColor(flightData[id].server), coords: liveTrails[id] }));
  globe.pathsData(trails);

  if (selectedId && flightData[selectedId]) {
    const f = flightData[selectedId];
    if (f.latitude != null) {
      globe.ringsData([{ lat: f.latitude, lng: f.longitude, color: sColor(f.server) }]);
    } else { globe.ringsData([]); }
  } else { globe.ringsData([]); }
}

/* ── Stale cleanup ──────────────────────────────────────────────────────────── */
function cleanStale() {
  const now = Date.now();
  let n = 0;
  for (const id of Object.keys(flightLastSeen)) {
    if (now - flightLastSeen[id] > STALE_MS) {
      delete flightData[id];
      delete liveTrails[id];
      delete flightLastSeen[id];
      if (id === selectedId) closeDetail();
      n++;
    }
  }
  if (n) { updateGlobe(); buildList(); }
}

/* ── Filtering ──────────────────────────────────────────────────────────────── */
function getVisible() {
  return Object.values(flightData).filter(f => {
    if (currentServer !== 'all' && f.server !== currentServer) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return (f.callsign || '').toLowerCase().includes(q)
          || (f.username || '').toLowerCase().includes(q)
          || (f.virtualOrganization || '').toLowerCase().includes(q);
    }
    return true;
  });
}

/* ── Sidebar list ───────────────────────────────────────────────────────────── */
function buildList() {
  const vis = getVisible();
  document.getElementById('flight-count').textContent = vis.length.toLocaleString();

  const list = document.getElementById('flight-list');
  if (!vis.length) {
    list.innerHTML = `<div class="fl-empty">${isOnline ? 'No flights' : 'Connecting…'}</div>`;
    return;
  }

  vis.sort((a, b) => {
    if (Boolean(a.onGround) !== Boolean(b.onGround)) return a.onGround ? 1 : -1;
    return (b.altitude || 0) - (a.altitude || 0);
  });

  const shown = vis.slice(0, LIST_MAX);
  const more  = vis.length > LIST_MAX
    ? `<div class="fl-overflow">Showing ${LIST_MAX} of ${vis.length} — use search to narrow</div>`
    : '';

  list.innerHTML = shown.map(f => {
    const id    = String(f.flightId);
    const col   = sColor(f.server);
    const state = sState(f.flightState);
    const cs    = esc(f.callsign || '—');
    const user  = esc(f.username || '');
    const vo    = f.virtualOrganization ? ` [${esc(f.virtualOrganization)}]` : '';
    const sname = (f.serverName || f.server || '').replace(' Server', '');
    const sel   = id === selectedId ? ' selected' : '';

    return `<div class="fl-item${sel}" onclick="selectFlight('${id}')">
  <div class="fl-r1">
    <div class="fl-dot" style="background:${col}"></div>
    <span class="fl-cs">${cs}</span>
    <span class="fl-stag" style="background:${col}18;color:${col};border:1px solid ${col}35">${sname}</span>
  </div>
  <div class="fl-r2">${user}${vo}</div>
  <div class="fl-r3">
    <span class="fl-alt">${fmtAlt(f.altitude)}</span>
    <span class="fl-sep">·</span>
    <span>${fmtSpeed(f.speed)}</span>
    <span class="fl-sep">·</span>
    <span class="s-badge" style="background:${state.color}18;color:${state.color}">${state.label}</span>
  </div>
</div>`;
  }).join('') + more;
}

/* ── Detail panel ───────────────────────────────────────────────────────────── */
function selectFlight(id) {
  id = String(id);
  selectedId = id;
  const f = flightData[id];
  if (!f) return;

  renderDetail(f);
  document.getElementById('right-sb').classList.add('open');
  buildList();
  updateGlobe();

  if (f.latitude != null && f.longitude != null) {
    globe?.pointOfView({ lat: f.latitude, lng: f.longitude, altitude: 1.8 }, 1200);
  }
}

function renderDetail(f) {
  const state = sState(f.flightState);
  const col   = sColor(f.server);

  document.getElementById('d-callsign').textContent = f.callsign || '—';
  document.getElementById('d-user').textContent     = f.username || '';

  const b = (txt, bg, fg, br) =>
    `<span style="display:inline-block;font-size:10px;padding:3px 9px;border-radius:4px;background:${bg};color:${fg};border:1px solid ${br};line-height:1.6">${txt}</span>`;
  let badges = b(state.label, state.color + '20', state.color, state.color + '40');
  if (f.virtualOrganization) badges += ' ' + b(esc(f.virtualOrganization), col + '18', col, col + '35');
  if (f.onGround) badges += ' ' + b('On Ground', '#f5a62318', '#f5a623', '#f5a62340');
  document.getElementById('d-badges').innerHTML = badges;

  document.getElementById('d-alt').textContent = fmtAlt(f.altitude);
  document.getElementById('d-spd').textContent = fmtSpeed(f.speed);
  document.getElementById('d-vs').textContent  = fmtVS(f.verticalSpeed);
  document.getElementById('d-trk').textContent = f.track != null ? Math.round(f.track) + '°' : '—';
  document.getElementById('d-lat').textContent = f.latitude  != null ? f.latitude.toFixed(4)  : '—';
  document.getElementById('d-lon').textContent = f.longitude != null ? f.longitude.toFixed(4) : '—';

  document.getElementById('d-server-row').innerHTML =
    `<span style="color:${col}">■</span>&nbsp;${esc(f.serverName || f.server || '')}`;
}

function closeDetail() {
  selectedId = null;
  document.getElementById('right-sb').classList.remove('open');
  updateGlobe();
  buildList();
}

/* ── Controls ───────────────────────────────────────────────────────────────── */
function filterSearch(val) {
  searchQuery = val.trim();
  buildList();
}

function setFilter(btn, server) {
  currentServer = server;
  document.querySelectorAll('.sf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildList();
}

const SPEED_CYCLE = ['kn', 'mph', 'km/h'];
function cycleSpeed() {
  speedUnit = SPEED_CYCLE[(SPEED_CYCLE.indexOf(speedUnit) + 1) % SPEED_CYCLE.length];
  document.getElementById('speed-btn').textContent = speedUnit;
  buildList();
  if (selectedId && flightData[selectedId]) renderDetail(flightData[selectedId]);
}

/* ── Connection status ──────────────────────────────────────────────────────── */
function setOnline(v) { isOnline = v; }

/* ── WebSocket ──────────────────────────────────────────────────────────────── */
function handleFlights(flights) {
  const now = Date.now();
  for (const f of flights || []) {
    const id = String(f.flightId);
    flightData[id]     = f;
    flightLastSeen[id] = f.ts || now;
    if (f.latitude != null && f.longitude != null) {
      (liveTrails[id] = liveTrails[id] || []).push([f.latitude, f.longitude]);
      if (liveTrails[id].length > TRAIL_MAX) liveTrails[id].shift();
    }
  }
  updateGlobe();
  buildList();
  if (selectedId && flightData[selectedId]) renderDetail(flightData[selectedId]);
  hideLoading();
}

let ws, wsRetry = 0;

function connectWS() {
  setOnline(false);
  try { ws = new WebSocket(WS_URL); } catch { retry(); return; }
  ws.onopen    = () => { wsRetry = 0; setOnline(true); };
  ws.onclose   = retry;
  ws.onerror   = () => ws.close();
  ws.onmessage = ({ data }) => {
    try {
      const m = JSON.parse(data);
      if (m.type === 'snapshot' || m.type === 'update') handleFlights(m.flights);
    } catch {}
  };
}

function retry() {
  setOnline(false);
  setTimeout(connectWS, Math.min(1000 * 2 ** wsRetry++, 30000));
}

/* ── Boot ───────────────────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  initGlobe();
  connectWS();
  setInterval(cleanStale, 60_000);
});
</script>
</body>
