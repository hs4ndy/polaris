<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polaris — Live Infinite Flight Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Exo:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    /* ── Reset ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design tokens ─────────────────────────────────────────────────────── */
    :root {
      --black:    #000000;
      --s1:       #0d0d0d;
      --s2:       #111111;
      --border:   #1e1e1e;
      --border2:  #2a2a2a;
      --text:     #f0f4f8;
      --text2:    #7a8694;
      --text3:    #3d4450;
      --accent:   #4f8ef7;
      --amber:    #f5a623;
      --purple:   #a855f7;
      --green:    #3fb950;
      --red:      #f85149;
      --glow-accent:  rgba(79, 142, 247, 0.22);
      --glow-amber:   rgba(245, 166, 35, 0.22);
      --glow-purple:  rgba(168, 85, 247, 0.22);
      --sidebar-w: 300px;
      --detail-w:  350px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--black);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      position: relative;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* ════════════════════════════════════════════════════════════════════════
       MAP — fills full viewport, sidebars float over it
    ════════════════════════════════════════════════════════════════════════ */
    #map {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: #060a0f;
    }

    /* ── Leaflet dark-theme overrides ── */
    .leaflet-container           { background: #060a0f; }
    .leaflet-tile-pane           { filter: brightness(0.88) saturate(0.8); }

    .leaflet-control-attribution {
      background: rgba(0,0,0,0.5) !important;
      backdrop-filter: blur(8px);
      color: rgba(255,255,255,0.18) !important;
      font-size: 8px !important;
      border-radius: 6px 0 0 0 !important;
      padding: 2px 6px !important;
    }
    .leaflet-control-attribution a { color: rgba(255,255,255,0.28) !important; }

    .leaflet-control-zoom {
      border: none !important;
      box-shadow: none !important;
      margin-right: 16px !important;
      margin-bottom: 16px !important;
    }
    .leaflet-control-zoom a {
      width: 32px !important;
      height: 32px !important;
      line-height: 32px !important;
      background: rgba(0,0,0,0.58) !important;
      backdrop-filter: blur(16px) saturate(140%);
      color: var(--text2) !important;
      border: 1px solid rgba(255,255,255,0.09) !important;
      font-size: 18px !important;
      font-weight: 300 !important;
      transition: background 0.18s, color 0.18s !important;
    }
    .leaflet-control-zoom a:hover {
      background: rgba(79,142,247,0.18) !important;
      color: var(--accent) !important;
      border-color: rgba(79,142,247,0.3) !important;
    }
    .leaflet-control-zoom-in  { border-radius: 7px 7px 0 0 !important; }
    .leaflet-control-zoom-out { border-radius: 0 0 7px 7px !important; border-top: 1px solid rgba(255,255,255,0.05) !important; }

    /* No native popups — we use our own detail panel */
    .leaflet-popup { display: none !important; }

    /* Aircraft div-icon wrapper */
    .ac-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      cursor: pointer;
    }
    .ac-icon svg { overflow: visible; }

    /* Version tag */
    #map-ver {
      position: absolute;
      bottom: 10px;
      right: 52px;   /* clear of zoom control */
      font-size: 9px;
      color: var(--text3);
      opacity: 0.45;
      pointer-events: none;
      letter-spacing: 0.06em;
      z-index: 5;
    }

    /* Loading overlay */
    #map-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #000;
      z-index: 30;
      transition: opacity 0.7s ease;
    }
    #map-loading.hidden { opacity: 0; pointer-events: none; }

    .load-rings { position: relative; width: 36px; height: 36px; }
    .load-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid transparent;
    }
    .load-ring:nth-child(1) { border-top-color: var(--accent); animation: spin 1.2s linear infinite; }
    .load-ring:nth-child(2) { inset: 6px; border-right-color: #2d4a7f; animation: spin 1.8s linear infinite reverse; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .load-txt { font-size: 11px; color: var(--text3); letter-spacing: 0.14em; }

    /* ════════════════════════════════════════════════════════════════════════
       LEFT SIDEBAR — Liquid glass panel floating over the map
    ════════════════════════════════════════════════════════════════════════ */
    #left-sb {
      position: absolute;
      top: 12px;
      left: 12px;
      bottom: 12px;
      width: var(--sidebar-w);
      z-index: 400;

      background: rgba(0, 0, 0, 0.44);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      overflow: hidden;

      box-shadow:
        0 8px 48px rgba(0,0,0,0.65),
        inset 0 1px 0 rgba(255,255,255,0.11),
        inset 0 0 0 0.5px rgba(255,255,255,0.04);

      display: flex;
      flex-direction: column;
    }

    /* Prism rainbow top edge */
    #left-sb::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1.5px;
      background: linear-gradient(90deg,
        rgba(79,142,247,0.55), rgba(139,92,246,0.65),
        rgba(56,189,248,0.5),  rgba(52,211,153,0.4),
        rgba(251,191,36,0.35), rgba(239,68,68,0.25), transparent
      );
      border-radius: 14px 14px 0 0;
      pointer-events: none;
      z-index: 2;
    }

    /* Header */
    #sb-hdr {
      padding: 8px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    #logo { display: block; width: 100%; height: auto; }

    /* Search */
    #sb-search {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .search-inner {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 6px;
      padding: 0 10px;
      gap: 7px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-inner:focus-within {
      border-color: rgba(79,142,247,0.45);
      box-shadow: 0 0 0 2px rgba(79,142,247,0.12);
    }
    .search-icon { flex-shrink: 0; color: var(--text3); font-size: 12px; pointer-events: none; padding-top: 1px; }
    #search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 8px 0;
    }
    #search-input::placeholder { color: var(--text3); }

    /* Server filter */
    #server-filter {
      display: flex;
      padding: 8px 10px;
      gap: 5px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .sf-btn {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 5px 0;
      border-radius: 5px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s, box-shadow 0.2s;
      letter-spacing: 0.03em;
    }
    .sf-btn:hover { color: var(--text2); background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.12); }
    .sf-btn.active[data-server="all"]      { background: rgba(79,142,247,0.14);  border-color: rgba(79,142,247,0.4);  color: var(--accent);  box-shadow: 0 0 12px rgba(79,142,247,0.2); }
    .sf-btn.active[data-server="expert"]   { background: rgba(79,142,247,0.14);  border-color: rgba(79,142,247,0.4);  color: var(--accent);  box-shadow: 0 0 12px rgba(79,142,247,0.2); }
    .sf-btn.active[data-server="training"] { background: rgba(245,166,35,0.12);  border-color: rgba(245,166,35,0.4);  color: var(--amber);   box-shadow: 0 0 12px rgba(245,166,35,0.2); }
    .sf-btn.active[data-server="casual"]   { background: rgba(168,85,247,0.12);  border-color: rgba(168,85,247,0.4);  color: var(--purple);  box-shadow: 0 0 12px rgba(168,85,247,0.2); }

    /* Count + speed toggle */
    #sb-meta {
      display: flex;
      align-items: center;
      padding: 7px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      gap: 6px;
      flex-shrink: 0;
      font-size: 11px;
      color: var(--text2);
    }
    #flight-count { font-weight: 700; color: var(--text); font-size: 12px; }
    #speed-btn {
      margin-left: auto;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    #speed-btn:hover { border-color: rgba(79,142,247,0.4); background: rgba(79,142,247,0.1); box-shadow: 0 0 10px rgba(79,142,247,0.18); }

    /* Flight list */
    #flight-list { flex: 1; overflow-y: auto; overflow-x: hidden; }
    #flight-list::-webkit-scrollbar       { width: 3px; }
    #flight-list::-webkit-scrollbar-track { background: transparent; }
    #flight-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .fl-item {
      padding: 9px 14px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }
    .fl-item:hover    { background: rgba(255,255,255,0.04); }
    .fl-item.selected {
      background: rgba(79,142,247,0.1);
      border-left: 2px solid var(--accent);
      padding-left: 12px;
      box-shadow: inset 4px 0 16px rgba(79,142,247,0.1);
    }
    .fl-item.selected::after {
      content: '';
      position: absolute;
      inset: 0; left: auto;
      width: 28px;
      background: linear-gradient(to left, #09152c, transparent);
      pointer-events: none;
    }

    .fl-r1 { display: flex; align-items: center; gap: 7px; }
    .fl-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .fl-cs  { font-weight: 700; font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; letter-spacing: 0.02em; }
    .fl-stag {
      font-size: 8px; font-weight: 600;
      padding: 2px 5px; border-radius: 3px;
      letter-spacing: 0.04em; flex-shrink: 0;
    }
    .fl-r2  { font-size: 11px; color: var(--text2); margin-top: 2px; padding-left: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fl-r3  { font-size: 11px; color: var(--text2); margin-top: 2px; padding-left: 13px; display: flex; align-items: center; gap: 5px; flex-wrap: nowrap; }
    .fl-alt { color: var(--text); font-weight: 600; }
    .fl-sep { color: var(--text3); }
    .s-badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; line-height: 1.5; }

    .fl-empty   { padding: 36px 14px; text-align: center; font-size: 12px; color: var(--text3); letter-spacing: 0.04em; }
    .fl-overflow{ padding: 8px 14px; text-align: center; font-size: 10px; color: var(--text3); border-top: 1px solid var(--border); }

    /* Beta footer */
    #sb-footer {
      padding: 8px 14px;
      border-top: 1px solid rgba(255,255,255,0.05);
      background: rgba(3,8,20,0.5);
      font-size: 9px;
      color: rgba(79,142,247,0.45);
      letter-spacing: 0.07em;
      flex-shrink: 0;
      text-align: center;
    }

    /* ════════════════════════════════════════════════════════════════════════
       RIGHT SIDEBAR — Detail panel, slides in from right
    ════════════════════════════════════════════════════════════════════════ */
    #right-sb {
      position: absolute;
      top: 12px;
      right: 12px;
      bottom: 12px;
      width: var(--detail-w);
      z-index: 400;
      display: flex;
      flex-direction: column;
      overflow: hidden;

      background: rgba(0, 0, 0, 0.44);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      box-shadow:
        0 8px 48px rgba(0,0,0,0.65),
        inset 0 1px 0 rgba(255,255,255,0.11),
        inset 0 0 0 0.5px rgba(255,255,255,0.04);

      transform: translateX(calc(100% + 24px));
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #right-sb.open { transform: translateX(0); }

    /* Prism edge — reversed */
    #right-sb::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1.5px;
      background: linear-gradient(90deg,
        transparent, rgba(239,68,68,0.25), rgba(251,191,36,0.35),
        rgba(52,211,153,0.4), rgba(56,189,248,0.5),
        rgba(139,92,246,0.65), rgba(79,142,247,0.55)
      );
      border-radius: 14px 14px 0 0;
      pointer-events: none;
      z-index: 2;
    }

    #detail-inner {
      width: 100%;
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0 0 32px;
    }
    #detail-inner::-webkit-scrollbar       { width: 3px; }
    #detail-inner::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    /* Detail header */
    #d-hdr {
      padding: 16px 16px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: relative;
    }
    #d-close {
      position: absolute;
      top: 14px; right: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text2);
      width: 26px; height: 26px;
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 12px;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    #d-close:hover { color: var(--text); border-color: rgba(255,255,255,0.18); background: rgba(255,255,255,0.1); }

    #d-callsign {
      font-family: 'Exo', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.03em;
      line-height: 1.1;
      padding-right: 36px;
      margin-bottom: 4px;
      /* No text-shadow — strict no-glow rule */
    }
    #d-user   { font-size: 12px; color: var(--text2); min-height: 17px; margin-bottom: 10px; }
    #d-badges { display: flex; flex-wrap: wrap; gap: 6px; }

    /* Data sections */
    .d-section { padding: 14px 16px 0; }
    .d-sec-label {
      font-size: 9px;
      color: var(--text3);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .d-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .dg-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 7px;
      padding: 9px 11px;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .dg-card:hover { border-color: rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); box-shadow: inset 0 1px 0 rgba(255,255,255,0.06); }
    .dg-lbl { font-size: 8px; color: var(--text3); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 5px; }
    .dg-val { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; }

    /* Server row */
    #d-server-row { padding: 12px 16px 0; font-size: 11px; color: var(--text2); }

    /* ── Performance chart ── */
    #d-chart-wrap {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 7px;
      padding: 8px 10px 4px;
      position: relative;
    }
    #d-chart-svg { width: 100%; height: 96px; display: block; }
    .d-chart-lbl {
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.14em;
      fill: var(--text3);
    }
    .d-chart-lgnd {
      position: absolute;
      top: 8px; right: 10px;
      display: flex;
      gap: 8px;
      font-size: 8px;
      letter-spacing: 0.14em;
      color: var(--text3);
      pointer-events: none;
    }
    .d-chart-lgnd span { display: inline-flex; align-items: center; gap: 4px; }
    .d-chart-lgnd i {
      display: inline-block;
      width: 8px; height: 1.5px;
      background: currentColor;
    }

    /* ── Waypoint list ── */
    #d-waypoints-section { padding: 14px 16px 0; }
    #d-waypoints {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 7px;
      padding: 4px 10px;
      max-height: 240px;
      overflow-y: auto;
    }
    #d-waypoints::-webkit-scrollbar       { width: 3px; }
    #d-waypoints::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .wp-item {
      display: grid;
      grid-template-columns: 12px 1fr auto auto;
      column-gap: 10px;
      align-items: center;
      padding: 6px 0;
      font-size: 11px;
      color: var(--text2);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-variant-numeric: tabular-nums;
    }
    .wp-item:last-child { border-bottom: none; }
    .wp-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text3);
      border: 1px solid transparent;
    }
    .wp-item.passed .wp-dot { background: var(--accent); }
    .wp-item.next   .wp-dot { background: transparent; border-color: var(--amber); }
    .wp-name { color: var(--text); font-weight: 600; letter-spacing: 0.02em; }
    .wp-item.future .wp-name { color: var(--text2); font-weight: 500; }
    .wp-dist, .wp-brng { color: var(--text3); font-size: 10px; }
    .wp-item.passed .wp-dist, .wp-item.passed .wp-brng { color: var(--text3); opacity: 0.6; }
    .wp-next-pill {
      grid-column: 1 / -1;
      justify-self: end;
      font-size: 8px;
      letter-spacing: 0.14em;
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--amber);
      color: var(--black);
      font-weight: 700;
      margin-top: 2px;
    }

    /* Departure / Destination cards — larger ICAOs for the headline route */
    .route-icao { font-size: 16px; font-weight: 700; letter-spacing: 0.06em; color: var(--text); }

    /* Mobile */
    @media (max-width: 768px) {
      #left-sb  { display: none; }
      #right-sb { display: none; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ══════════════ MAP ══════════════ -->
  <div id="map">
    <div id="map-loading">
      <div class="load-rings">
        <div class="load-ring"></div>
        <div class="load-ring"></div>
      </div>
      <span class="load-txt">CONNECTING…</span>
    </div>
  </div>
  <div id="map-ver">v0.1.0</div>

  <!-- ══════════════ LEFT SIDEBAR ══════════════ -->
  <div id="left-sb">

    <div id="sb-hdr">
      <img id="logo" src="polaris-logo.png" alt="Polaris">
    </div>

    <div id="sb-search">
      <div class="search-inner">
        <span class="search-icon">
          <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="6.5" cy="6.5" r="4"/><line x1="10" y1="10" x2="14" y2="14"/>
          </svg>
        </span>
        <input id="search-input" type="text" placeholder="Search callsign or pilot…"
               oninput="filterSearch(this.value)" autocomplete="off" spellcheck="false">
      </div>
    </div>

    <div id="server-filter">
      <button class="sf-btn"        data-server="expert"   onclick="setFilter(this,'expert')">Expert</button>
      <button class="sf-btn"        data-server="training" onclick="setFilter(this,'training')">Training</button>
      <button class="sf-btn active" data-server="casual"   onclick="setFilter(this,'casual')">Casual</button>
    </div>

    <div id="sb-meta">
      <span id="flight-count">0</span>
      <span style="color:var(--text3)">flights</span>
      <button id="speed-btn" onclick="cycleSpeed()">kn</button>
    </div>

    <div id="flight-list">
      <div class="fl-empty">Connecting…</div>
    </div>

    <div id="sb-footer">Beta — expect bugs &nbsp;·&nbsp; v0.1.0</div>
  </div>

<script>
'use strict';

/* ── Config ─────────────────────────────────────────────────────────────────── */
const WS_URL = location.hostname === 'localhost'
  ? 'ws://localhost:3001'
  : 'wss://polaris-proxy-u3fw.onrender.com';

const PROXY_BASE = location.hostname === 'localhost'
  ? 'http://localhost:3001'
  : 'https://polaris-proxy-u3fw.onrender.com';

const SERVER_COLOR = {
  expert:   '#4f8ef7',
  training: '#f5a623',
  casual:   '#a855f7',
};

const FLIGHT_STATE = {
  0: { label: 'Unknown',   color: '#5a6270' },
  1: { label: 'Preflight', color: '#5a6270' },
  2: { label: 'Taxi',      color: '#f5a623' },
  3: { label: 'Takeoff',   color: '#4f8ef7' },
  4: { label: 'Cruise',    color: '#3fb950' },
  5: { label: 'Approach',  color: '#f5a623' },
  6: { label: 'Landing',   color: '#f85149' },
  7: { label: 'Parked',    color: '#5a6270' },
};

const STALE_MS  = 5 * 60 * 1000;
const TRAIL_MAX = 100;   // ~25 min at 15 s intervals — client fallback if /path fails
const LIST_MAX  = 300;

// ── Path / trail rendering constants ───────────────────────────────────────────
const HALO_COLOR     = '#06080c';   // near-black outline under colored strokes
const TRAIL_STEPS    = 5;           // sub-segment count for stepped opacity fade
const TRAIL_OP_MIN   = 0.50;        // oldest sub-segment
const TRAIL_OP_MAX   = 0.90;        // newest sub-segment
const PROJECTION_MIN_S = 60;        // projection extrapolates ≥60 s ahead
const PROJECTION_MAX_S = 300;       // … and at most 5 min — leaves room for flight plan

/* ── State ──────────────────────────────────────────────────────────────────── */
const flightData     = {};  // flightId → flight object
const liveTrails     = {};  // flightId → [[lat, lng], ...]
const flightLastSeen = {};  // flightId → timestamp
const markers        = {};  // flightId → L.Marker

let selectedId    = null;
let currentServer = 'casual';
let searchQuery   = '';
let speedUnit     = 'kn';
let map           = null;
let trailLines    = [];     // L.Polyline[] — historical trail (halo + colored steps)
let projLines     = [];     // L.Polyline[] — short white dashed projection (halo + dash)
let planLines     = [];     // L.Polyline[] — flight plan past + future (with halos)
let selectedTrail   = [];     // [{lat,lng,...}] — server path + live appends for selectedId
let flightPlanWPs   = null;   // flat [{name,type,lat,lng,alt}, ...] — source of truth for plan
let flightPlanState = 'idle'; // 'idle' | 'loading' | 'loaded' | 'empty' — drives placeholder UI
let isOnline      = false;
let planeSvg      = null;   // cached SVG markup from plane.svg, loaded once at boot
let svgRenderer   = null;   // explicit L.svg() renderer for all path polylines

/* ── Utilities ──────────────────────────────────────────────────────────────── */
const esc = s => String(s || '')
  .replace(/&/g,'&amp;').replace(/</g,'&lt;')
  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const sColor = s => SERVER_COLOR[s] || '#5a6270';
// Returns state object only for meaningful states (2-7); null for Unknown/Preflight
const sState = n => (n >= 2 && n <= 7) ? FLIGHT_STATE[n] : null;

function fmtSpeed(kn) {
  if (kn == null || isNaN(kn)) return '—';
  if (speedUnit === 'mph')  return Math.round(kn * 1.15078) + ' mph';
  if (speedUnit === 'km/h') return Math.round(kn * 1.852)   + ' km/h';
  return Math.round(kn) + ' kn';
}
function fmtAlt(ft) {
  if (ft == null) return '—';
  const n = Math.round(ft);
  if (n >= 18000) return 'FL' + Math.round(n / 100);
  return n.toLocaleString() + ' ft';
}
function fmtVS(vs) {
  if (vs == null) return '—';
  const n = Math.round(vs);
  return (n >= 0 ? '↑ ' : '↓ ') + Math.abs(n).toLocaleString() + ' fpm';
}

/* ── Airplane icon (SVG divIcon) ─────────────────────────────────────────────── */
//  Top-down silhouette. Nose points UP (north) when heading = 0.
//  CSS transform: rotate(heading deg) turns it to the right direction.
const PLANE_PATH = `M0,-11 C1,-8 1.5,-3.5 1.5,-1.5
  L13,3 11.5,6.5 1.5,2.5 1.5,7
  L5,11 2.5,12.5 0,9.5 -2.5,12.5 -5,11
  L-1.5,7 -1.5,2.5 -11.5,6.5 -13,3
  C-1.5,-3.5 -1,-8 0,-11 Z`;

function makeIcon(f) {
  const id      = String(f.flightId);
  const isSel   = id === selectedId;
  const dimmed  = selectedId && !isSel;
  const color   = sColor(f.server);
  const hdg     = f.track || 0;
  // Relaxed dim (was 0.18) so other planes remain visible context rather
  // than vanishing entirely.
  const opacity = dimmed ? 0.45 : 1.0;

  if (f.onGround) {
    // Tiny filled square for ground traffic — no shadow / no glow
    const sz = isSel ? 10 : 7;
    return L.divIcon({
      html: `<div class="ac-icon" style="width:${sz}px;height:${sz}px;opacity:${opacity}">
               <div style="width:${sz}px;height:${sz}px;border-radius:2px;background:${color}"></div>
             </div>`,
      className: '',
      iconSize:   [sz, sz],
      iconAnchor: [sz/2, sz/2],
    });
  }

  // Selected plane just renders slightly larger — no glow (strict palette / no glow rule)
  const sz = isSel ? 30 : 24;

  // Use external plane.svg if loaded; fall back to built-in PLANE_PATH
  let innerHtml;
  if (planeSvg) {
    // Resize the cached SVG to sz×sz; CSS `color:${color}` on wrapper drives currentColor fills
    const sized = planeSvg
      .replace(/(<svg[^>]*)\s+width="[^"]*"/i,  `$1 width="${sz}"`)
      .replace(/(<svg[^>]*)\s+height="[^"]*"/i, `$1 height="${sz}"`);
    innerHtml = sized;
  } else {
    innerHtml = `<svg xmlns="http://www.w3.org/2000/svg"
      viewBox="-15 -14 30 28" width="${sz}" height="${sz}">
      <path d="${PLANE_PATH}" fill="${color}"/>
    </svg>`;
  }

  return L.divIcon({
    html: `<div class="ac-icon" style="color:${color};width:${sz}px;height:${sz}px;
               transform:rotate(${hdg}deg);opacity:${opacity}">
             ${innerHtml}
           </div>`,
    className: '',
    iconSize:   [sz, sz],
    iconAnchor: [sz/2, sz/2],
  });
}

/* ── Great-circle projection ─────────────────────────────────────────────────── */
//  Caller controls the projection distance in km — used for both the short
//  projection-ahead bridge AND any other "draw a great-circle arc N km from
//  this point in this bearing" need.
function projectAheadKm(lat, lng, trackDeg, distKm) {
  const R = 6371, d = distKm / R;
  const lat1 = lat * Math.PI / 180;
  const lng1 = lng * Math.PI / 180;
  const brng = trackDeg * Math.PI / 180;
  const pts  = [];
  // Lower point count — 20 is more than enough for a 5-minute arc
  for (let i = 0; i <= 20; i++) {
    const f = i / 20;
    const φ = Math.asin(
      Math.sin(lat1)*Math.cos(f*d) + Math.cos(lat1)*Math.sin(f*d)*Math.cos(brng)
    );
    const λ = lng1 + Math.atan2(
      Math.sin(brng)*Math.sin(f*d)*Math.cos(lat1),
      Math.cos(f*d)-Math.sin(lat1)*Math.sin(φ)
    );
    pts.push([φ * 180/Math.PI, λ * 180/Math.PI]);
  }
  return pts;
}

/* ── Haversine ───────────────────────────────────────────────────────────────── */
function haversineNm(lat1, lon1, lat2, lon2) {
  const R = 3440.065;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2
          + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

/* ── Fetch flight plan from proxy ────────────────────────────────────────────── */
async function fetchFlightPlan(flightId) {
  try {
    const res = await fetch(`${PROXY_BASE}/flightplan/${flightId}`);
    if (!res.ok) return null;
    const json = await res.json();
    return json?.result ?? null;
  } catch { return null; }
}

/* ── Fetch rolling path history from proxy ───────────────────────────────────── */
async function fetchPath(flightId) {
  try {
    const res = await fetch(`${PROXY_BASE}/path/${flightId}`);
    if (!res.ok) return [];
    const json = await res.json();
    return Array.isArray(json?.result) ? json.result : [];
  } catch { return []; }
}

/* ── Anti-meridian split ─────────────────────────────────────────────────────── */
//  Polyline segments are broken wherever two consecutive points jump by > 180°
//  of longitude (i.e. they cross the date line). Each cohesive piece is its own
//  array so Leaflet doesn't draw a wraparound line across the whole world.
function splitAtAntimeridian(pts) {
  const out = [];
  let cur = [];
  for (const p of pts) {
    if (cur.length) {
      const prev = cur[cur.length - 1];
      if (Math.abs(p[1] - prev[1]) > 180) { out.push(cur); cur = []; }
    }
    cur.push(p);
  }
  if (cur.length >= 2) out.push(cur);
  return out;
}

/* ── Flatten a hierarchical flight plan into rich waypoint records ──────────── */
//  Returns [{name, type, lat, lng, alt}, ...] in route order. Procedure waypoints
//  inside `children` are inlined in place. The flat polyline coord array used
//  for path rendering is derived from this list.
function flattenFlightPlan(items) {
  const wps = [];
  if (!Array.isArray(items)) return wps;
  for (const it of items) {
    if (it?.location?.latitude != null && it?.location?.longitude != null) {
      wps.push({
        name: (it.name || it.identifier || '·').trim(),
        type: it.type ?? 1,                         // 0=origin, 1=waypoint, 2=destination
        lat:  it.location.latitude,
        lng:  it.location.longitude,
        alt:  it.altitude,
      });
    }
    if (Array.isArray(it?.children) && it.children.length) {
      wps.push(...flattenFlightPlan(it.children));
    }
  }
  return wps;
}

/* ── Compass bearing from (lat1,lon1) to (lat2,lon2), degrees 0-360 ──────────── */
function bearingDeg(lat1, lon1, lat2, lon2) {
  const φ1 = lat1 * Math.PI / 180;
  const φ2 = lat2 * Math.PI / 180;
  const Δλ = (lon2 - lon1) * Math.PI / 180;
  const y  = Math.sin(Δλ) * Math.cos(φ2);
  const x  = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

/* ── Split flight plan into past + future at the plane's current position ───── */
function splitPlanAtPlane(pts, planeLat, planeLng) {
  if (pts.length < 2) return { past: [], future: pts.slice() };
  // Find the waypoint closest to the plane (squared planar distance is fine
  // at airliner scale — exact great-circle isn't worth the cycles).
  let idx = 0, best = Infinity;
  for (let i = 0; i < pts.length; i++) {
    const dy = pts[i][0] - planeLat;
    const dx = pts[i][1] - planeLng;
    const d  = dy * dy + dx * dx;
    if (d < best) { best = d; idx = i; }
  }
  return {
    past:   pts.slice(0, idx + 1).concat([[planeLat, planeLng]]),
    future: [[planeLat, planeLng]].concat(pts.slice(idx + 1)),
  };
}

/* ── Map init ────────────────────────────────────────────────────────────────── */
function initMap() {
  map = L.map('map', {
    zoomControl:       false,
    attributionControl: true,
    center:    [25, 15],
    zoom:      3,
    minZoom:   2,
    maxZoom:   16,
    worldCopyJump: true,
    // No preferCanvas — we want SVG rendering for polylines so dashArray
    // and per-segment styling work cleanly. Markers are divIcons (DOM) anyway.
  });

  // Custom panes that sit between tiles (200) and markers (600), so paths
  // never overlap the plane icons.
  map.createPane('flight-path-pane').style.zIndex = '425';
  map.createPane('flight-plan-pane').style.zIndex = '430';
  // Both panes are non-interactive — clicks pass through to markers below.
  map.getPane('flight-path-pane').style.pointerEvents = 'none';
  map.getPane('flight-plan-pane').style.pointerEvents = 'none';

  // Explicit SVG renderer for all path layers (overrides any future defaults)
  svgRenderer = L.svg({ padding: 0.5 });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/attributions">CARTO</a>',
    subdomains:  'abcd',
    maxZoom:     19,
  }).addTo(map);

  L.control.zoom({ position: 'bottomright' }).addTo(map);
}

/* ── Clear all path layers ───────────────────────────────────────────────────── */
function clearPathLayers() {
  trailLines.forEach(l => map?.removeLayer(l)); trailLines = [];
  projLines .forEach(l => map?.removeLayer(l)); projLines  = [];
  planLines .forEach(l => map?.removeLayer(l)); planLines  = [];
}

/* ── Render historical trail (halo + 5-step opacity fade) ───────────────────── */
//  Mirrors the technique from infinitehorizon.app/tracker — a dark "halo" stroke
//  drawn underneath the server-colored stroke so the line is readable on any
//  tile background. Then the trail is split into N small sub-polylines, each
//  with a stepped opacity (0.5 → 0.9). The Polaris twist:
//    • single server color, not altitude rainbow (strict palette)
//    • discrete opacity steps, not a smooth gradient
//    • no box-shadow, no filter, no glow
function renderTrail(coords, color) {
  if (!coords || coords.length < 2) return;
  const out = [];

  for (const seg of splitAtAntimeridian(coords)) {
    if (seg.length < 2) continue;

    // Dark halo — the entire segment in one go, slightly wider and dimmer
    out.push(
      L.polyline(seg, {
        renderer:  svgRenderer,
        pane:      'flight-path-pane',
        color:     HALO_COLOR,
        weight:    4,
        opacity:   0.55,
        lineCap:   'round',
        lineJoin:  'round',
      }).addTo(map)
    );

    // Colored line, split into TRAIL_STEPS sub-segments with stepped opacity.
    // Each sub-segment shares its first point with the previous one's last
    // point so they connect cleanly with no visible gap.
    const n = seg.length;
    for (let i = 0; i < TRAIL_STEPS; i++) {
      const from = Math.floor(i       * (n - 1) / TRAIL_STEPS);
      const to   = Math.floor((i + 1) * (n - 1) / TRAIL_STEPS) + 1;
      const sub  = seg.slice(from, to);
      if (sub.length < 2) continue;

      const t  = TRAIL_STEPS === 1 ? 1 : i / (TRAIL_STEPS - 1);
      const op = TRAIL_OP_MIN + t * (TRAIL_OP_MAX - TRAIL_OP_MIN);

      out.push(
        L.polyline(sub, {
          renderer: svgRenderer,
          pane:     'flight-path-pane',
          color,
          weight:   2.5,
          opacity:  op,
          lineCap:  'butt',
          lineJoin: 'round',
        }).addTo(map)
      );
    }
  }

  trailLines = out;
}

/* ── Render short white dashed projection (halo + dash) ────────────────────── */
function renderProjection(f) {
  if (!f || f.latitude == null || f.track == null || f.onGround) return;
  if ((f.speed || 0) < 30) return;

  // 4-minute look-ahead — the *immediate trajectory*. The filed flight plan
  // shows the long-range route on its own polyline, so this stays short.
  const seconds = 240;
  const distKm  = (f.speed * 1.852 / 3600) * seconds;   // kt → km/h → km
  if (distKm < 5) return;
  const pts = projectAheadKm(f.latitude, f.longitude, f.track, distKm);
  if (pts.length < 2) return;

  const out = [];
  for (const seg of splitAtAntimeridian(pts)) {
    if (seg.length < 2) continue;

    // halo
    out.push(L.polyline(seg, {
      renderer: svgRenderer,
      pane:     'flight-path-pane',
      color:    HALO_COLOR,
      weight:   4,
      opacity:  0.50,
      lineCap:  'round',
      lineJoin: 'round',
    }).addTo(map));

    // white dashed line
    out.push(L.polyline(seg, {
      renderer:  svgRenderer,
      pane:      'flight-path-pane',
      color:     '#f0f4f8',
      weight:    2,
      opacity:   0.85,
      dashArray: '4 7',
      lineCap:   'round',
      lineJoin:  'round',
    }).addTo(map));
  }
  projLines = out;
}

/* ── Render flight plan as past + future polylines ─────────────────────────── */
function renderFlightPlanRoute(f) {
  if (!flightPlanWPs || flightPlanWPs.length < 2 || !f) return;
  const planPts = flightPlanWPs.map(w => [w.lat, w.lng]);
  const { past, future } = splitPlanAtPlane(planPts, f.latitude, f.longitude);

  const out = [];
  const drawSegments = (pts, colorOpts) => {
    for (const seg of splitAtAntimeridian(pts)) {
      if (seg.length < 2) continue;
      // halo
      out.push(L.polyline(seg, {
        renderer: svgRenderer,
        pane:     'flight-plan-pane',
        color:    HALO_COLOR,
        weight:   3.5,
        opacity:  0.45,
        lineCap:  'round',
        lineJoin: 'round',
      }).addTo(map));
      // visible dashed line
      out.push(L.polyline(seg, {
        renderer:  svgRenderer,
        pane:      'flight-plan-pane',
        ...colorOpts,
        lineJoin:  'round',
      }).addTo(map));
    }
  };

  // PAST — very subtle, low priority, behind the plane
  drawSegments(past, {
    color:     '#3d4450',      // var(--text3)
    weight:    1.5,
    opacity:   0.55,
    dashArray: '4 8',
  });

  // FUTURE — slightly brighter, where it's still going
  drawSegments(future, {
    color:     '#7a8694',      // var(--text2)
    weight:    1.8,
    opacity:   0.75,
    dashArray: '8 8',
  });

  planLines = out;
}

/* ── Master refresh: rebuild every path layer for the selected flight ───────── */
function updateTrails() {
  clearPathLayers();
  if (!selectedId || !flightData[selectedId] || !map) return;

  const f     = flightData[selectedId];
  const color = sColor(f.server);

  // Use server-fetched path if available; otherwise fall back to the
  // client-side liveTrails accumulator (won't have history if just opened).
  const trail = selectedTrail.length >= 2
    ? selectedTrail.map(p => [p.lat, p.lng])
    : (liveTrails[selectedId] || []);

  renderTrail(trail, color);
  renderProjection(f);
  renderFlightPlanRoute(f);
}

/* ── Marker update ───────────────────────────────────────────────────────────── */
function updateMarkers() {
  if (!map) return;

  // IDs that should be visible right now
  const visibleIds = new Set(
    Object.values(flightData)
      .filter(f =>
        (currentServer === 'all' || f.server === currentServer) &&
        f.latitude != null && f.longitude != null
      )
      .map(f => String(f.flightId))
  );

  // Remove markers no longer in view
  for (const id of Object.keys(markers)) {
    if (!visibleIds.has(id)) {
      map.removeLayer(markers[id]);
      delete markers[id];
    }
  }

  // Add or update markers
  for (const id of visibleIds) {
    const f   = flightData[id];
    const pos = [f.latitude, f.longitude];
    const ico = makeIcon(f);

    if (markers[id]) {
      markers[id].setLatLng(pos);
      markers[id].setIcon(ico);
      if (id === selectedId) markers[id].setZIndexOffset(1000);
      else                   markers[id].setZIndexOffset(0);
    } else {
      const m = L.marker(pos, {
        icon:          ico,
        zIndexOffset:  id === selectedId ? 1000 : 0,
        keyboard:      false,
        riseOnHover:   true,
      });
      m.on('click', () => selectFlight(id));
      m.addTo(map);
      markers[id] = m;
    }
  }

  updateTrails();
}

/* ── Stale cleanup ───────────────────────────────────────────────────────────── */
function cleanStale() {
  const now = Date.now();
  let dirty = false;
  for (const id of Object.keys(flightLastSeen)) {
    if (now - flightLastSeen[id] > STALE_MS) {
      if (markers[id]) { map?.removeLayer(markers[id]); delete markers[id]; }
      delete flightData[id];
      delete liveTrails[id];
      delete flightLastSeen[id];
      if (id === selectedId) closeDetail();
      dirty = true;
    }
  }
  if (dirty) buildList();
}

/* ── Filtering helpers ───────────────────────────────────────────────────────── */
function getVisible() {
  return Object.values(flightData).filter(f => {
    if (currentServer !== 'all' && f.server !== currentServer) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return (f.callsign || '').toLowerCase().includes(q)
          || (f.username || '').toLowerCase().includes(q)
          || (f.virtualOrganization || '').toLowerCase().includes(q);
    }
    return true;
  });
}

/* ── Sidebar list ────────────────────────────────────────────────────────────── */
function buildList() {
  const vis = getVisible();
  document.getElementById('flight-count').textContent = vis.length.toLocaleString();

  const list = document.getElementById('flight-list');
  if (!vis.length) {
    list.innerHTML = `<div class="fl-empty">${isOnline ? 'No flights' : 'Connecting…'}</div>`;
    return;
  }

  vis.sort((a, b) => {
    if (Boolean(a.onGround) !== Boolean(b.onGround)) return a.onGround ? 1 : -1;
    return (b.altitude || 0) - (a.altitude || 0);
  });

  const shown = vis.slice(0, LIST_MAX);
  const more  = vis.length > LIST_MAX
    ? `<div class="fl-overflow">Showing ${LIST_MAX} of ${vis.length} — use search to narrow</div>`
    : '';

  list.innerHTML = shown.map(f => {
    const id    = String(f.flightId);
    const col   = sColor(f.server);
    const state = sState(f.flightState);  // null if Unknown/Preflight
    const cs    = esc(f.callsign || '—');
    const user  = esc(f.username || '');
    const vo    = f.virtualOrganization ? ` [${esc(f.virtualOrganization)}]` : '';
    const sname = (f.serverName || f.server || '').replace(' Server', '');
    const sel   = id === selectedId ? ' selected' : '';
    const stateBadge = state
      ? `<span class="fl-sep">·</span><span class="s-badge" style="background:${state.color}18;color:${state.color}">${state.label}</span>`
      : '';

    return `<div class="fl-item${sel}" onclick="selectFlight('${id}')">
  <div class="fl-r1">
    <div class="fl-dot" style="background:${col}"></div>
    <span class="fl-cs">${cs}</span>
    <span class="fl-stag" style="background:${col}18;color:${col};border:1px solid ${col}35">${sname}</span>
  </div>
  <div class="fl-r2">${user}${vo}</div>
  <div class="fl-r3">
    <span class="fl-alt">${fmtAlt(f.altitude)}</span>
    <span class="fl-sep">·</span>
    <span>${fmtSpeed(f.speed)}</span>
    ${stateBadge}
  </div>
</div>`;
  }).join('') + more;
}

/* ── Detail panel ────────────────────────────────────────────────────────────── */
function selectFlight(id) {
  id = String(id);
  selectedId = id;
  const f = flightData[id];
  if (!f) return;

  // Reset selection-scoped state before fetches resolve
  selectedTrail   = [];
  flightPlanWPs   = null;
  flightPlanState = 'loading';

  renderDetail(f);
  document.getElementById('right-sb').classList.add('open');
  buildList();
  updateMarkers();   // re-dims other planes
  updateTrails();    // clears old trail/projection/plan layers immediately

  if (f.latitude != null && f.longitude != null) {
    map?.flyTo([f.latitude, f.longitude], Math.max(map.getZoom(), 6), {
      duration: 1.2,
      easeLinearity: 0.4,
    });
  }

  // Parallel: pull rolling history (for trail) and flight plan (for route + ETA)
  fetchPath(id).then(history => {
    if (selectedId !== id) return;
    selectedTrail = history;
    updateTrails();
    renderChart();   // draw the performance chart now that we have history
  });

  fetchFlightPlan(id).then(plan => {
    if (selectedId !== id) return;
    const items = plan?.flightPlanItems;
    if (items?.length) {
      flightPlanWPs   = flattenFlightPlan(items);
      flightPlanState = 'loaded';
    } else {
      flightPlanWPs   = null;
      flightPlanState = 'empty';
    }
    updateTrails();
    refreshRouteFields();
    if (flightData[id]) renderWaypoints(flightData[id]);
  }).catch(() => {
    if (selectedId !== id) return;
    flightPlanWPs   = null;
    flightPlanState = 'empty';
    refreshRouteFields();
    renderWaypoints(flightData[id]);
  });
}

function renderDetail(f) {
  const state = sState(f.flightState);  // null for Unknown/Preflight
  const col   = sColor(f.server);

  document.getElementById('d-callsign').textContent = f.callsign || '—';
  // IFC line: pilot username + (optional) virtual org as a separator-delimited line
  const userLine = f.username
    ? `IFC: ${esc(f.username)}` + (f.virtualOrganization ? ` · ${esc(f.virtualOrganization)}` : '')
    : '';
  document.getElementById('d-user').innerHTML = userLine;

  // Aircraft type — show/hide the whole section depending on whether we have data
  const acName = f.aircraft || '';
  document.getElementById('d-aircraft').textContent = acName || '—';
  document.getElementById('d-aircraft-section').style.display = acName ? '' : 'none';

  // Badges — palette-strict, no glow
  const b = (txt, bg, fg, br) =>
    `<span style="display:inline-block;font-size:10px;padding:3px 9px;border-radius:4px;
      background:${bg};color:${fg};border:1px solid ${br};line-height:1.6">${txt}</span>`;

  let badges = '';
  if (state) badges += b(state.label, state.color + '20', state.color, state.color + '40');
  if (f.onGround) badges += ' ' + b('On Ground', '#f5a62318', '#f5a623', '#f5a62340');
  if (f.flightState === 4 && !f.onGround) {
    badges += ' ' + b('Autopilot Plus', '#3fb95018', '#3fb950', '#3fb95040');
  }
  document.getElementById('d-badges').innerHTML = badges;

  // Navigation cards
  document.getElementById('d-alt').textContent = fmtAlt(f.altitude);
  document.getElementById('d-spd').textContent = fmtSpeed(f.speed);
  document.getElementById('d-vs').textContent  = fmtVS(f.verticalSpeed);
  document.getElementById('d-trk').textContent = f.track != null ? Math.round(f.track).toString().padStart(3,'0') + '°' : '—';

  // Route + waypoints + chart are populated by their own helpers
  refreshRouteFields();
  renderChart();
  renderWaypoints(f);

  document.getElementById('d-server-row').innerHTML =
    `<span style="color:${col}">■</span>&nbsp;${esc(f.serverName || f.server || '')}`;
}

/* ── Route progress (Dep/Dest/Flown/To Go/Progress/ETA) ─────────────────────── */
function computeRouteProgress(wps, planeLat, planeLng) {
  if (!wps || wps.length < 2 || planeLat == null || planeLng == null) return null;

  // Find closest waypoint to plane (squared planar distance — fine at this scale)
  let closestIdx = 0, best = Infinity;
  for (let i = 0; i < wps.length; i++) {
    const dy = wps[i].lat - planeLat;
    const dx = wps[i].lng - planeLng;
    const d  = dy * dy + dx * dx;
    if (d < best) { best = d; closestIdx = i; }
  }

  // Flown: legs 0..closestIdx + closestIdx → plane
  let flown = 0;
  for (let i = 0; i < closestIdx; i++) {
    flown += haversineNm(wps[i].lat, wps[i].lng, wps[i+1].lat, wps[i+1].lng);
  }
  flown += haversineNm(wps[closestIdx].lat, wps[closestIdx].lng, planeLat, planeLng);

  // To go: plane → next + remaining legs
  let togo = 0;
  if (closestIdx < wps.length - 1) {
    togo += haversineNm(planeLat, planeLng, wps[closestIdx + 1].lat, wps[closestIdx + 1].lng);
    for (let i = closestIdx + 1; i < wps.length - 1; i++) {
      togo += haversineNm(wps[i].lat, wps[i].lng, wps[i+1].lat, wps[i+1].lng);
    }
  }

  const total    = flown + togo;
  const progress = total > 0 ? Math.max(0, Math.min(100, (flown / total) * 100)) : 0;
  return { flown, togo, progress, closestIdx };
}

function refreshRouteFields() {
  const id = selectedId;
  const f  = id ? flightData[id] : null;
  if (!f) return;

  const set = (elId, val) => { document.getElementById(elId).textContent = val; };

  // Loading state — fetches haven't resolved yet
  if (flightPlanState === 'loading') {
    set('d-dep', '…'); set('d-dest', '…');
    set('d-flown', '…'); set('d-togo', '…');
    set('d-prog', '…'); set('d-eta', '…');
    return;
  }

  // No flight plan filed (most casual server flights)
  if (flightPlanState === 'empty' || !flightPlanWPs || flightPlanWPs.length < 2) {
    set('d-dep', 'N/A'); set('d-dest', 'N/A');
    set('d-flown', '—'); set('d-togo', '—');
    set('d-prog', '—');  set('d-eta', 'N/A');
    return;
  }

  // Loaded — populate from the flat waypoint list
  const origin = flightPlanWPs.find(w => w.type === 0) || flightPlanWPs[0];
  const last   = [...flightPlanWPs].reverse().find(w => w.type === 2) || flightPlanWPs[flightPlanWPs.length - 1];
  set('d-dep',  origin.name || '—');
  set('d-dest', last.name   || '—');

  const prog = computeRouteProgress(flightPlanWPs, f.latitude, f.longitude);
  if (prog) {
    set('d-flown', Math.round(prog.flown).toLocaleString() + ' NM');
    set('d-togo',  Math.round(prog.togo ).toLocaleString() + ' NM');
    set('d-prog',  Math.round(prog.progress) + '%');

    if (f.speed > 10) {
      const etaMins = Math.round(prog.togo / f.speed * 60);
      const eta     = new Date(Date.now() + etaMins * 60_000);
      set('d-eta',
        String(eta.getUTCHours()).padStart(2,'0') + ':' +
        String(eta.getUTCMinutes()).padStart(2,'0') + 'Z');
    } else {
      set('d-eta', 'N/A');
    }
  } else {
    set('d-flown', '—'); set('d-togo', '—');
    set('d-prog', '—');  set('d-eta', '—');
  }
}

/* ── Performance chart (inline SVG: altitude purple + speed accent) ─────────── */
function renderChart() {
  const svg = document.getElementById('d-chart-svg');
  if (!svg) return;
  svg.innerHTML = '';   // clear previous render

  const pts = selectedTrail.filter(p => p.ts != null);
  const NS  = 'http://www.w3.org/2000/svg';

  // Placeholder when we don't have enough history yet
  if (pts.length < 2) {
    const t = document.createElementNS(NS, 'text');
    t.setAttribute('x', '150');
    t.setAttribute('y', '52');
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('class', 'd-chart-lbl');
    t.textContent = 'Building history…';
    svg.appendChild(t);
    return;
  }

  // Layout constants (must match the viewBox 300 × 96 set in HTML)
  const W = 300, H = 96;
  const padL = 4, padR = 4, padT = 18, padB = 4;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;

  // Ranges
  const tMin = pts[0].ts, tMax = pts[pts.length - 1].ts;
  const tRange = tMax - tMin || 1;
  const alts = pts.map(p => p.alt).filter(a => a != null && !isNaN(a));
  const spds = pts.map(p => p.spd).filter(s => s != null && !isNaN(s));
  if (!alts.length && !spds.length) return;
  const aMin = alts.length ? Math.min(...alts) : 0;
  const aMax = alts.length ? Math.max(...alts) : 1;
  const aRange = (aMax - aMin) || 1;
  const sMin = spds.length ? Math.min(...spds) : 0;
  const sMax = spds.length ? Math.max(...spds) : 1;
  const sRange = (sMax - sMin) || 1;

  const xOf  = t => padL + (t - tMin) / tRange * innerW;
  const yAlt = a => padT + innerH - (a - aMin) / aRange * innerH;
  const ySpd = s => padT + innerH - (s - sMin) / sRange * innerH;

  // Subtle middle baseline — a single faint horizontal line for orientation
  const grid = document.createElementNS(NS, 'line');
  grid.setAttribute('x1', padL);
  grid.setAttribute('x2', W - padR);
  grid.setAttribute('y1', (padT + innerH / 2).toFixed(1));
  grid.setAttribute('y2', (padT + innerH / 2).toFixed(1));
  grid.setAttribute('stroke', 'rgba(255,255,255,0.05)');
  grid.setAttribute('stroke-width', '1');
  svg.appendChild(grid);

  // Speed line (accent blue) — drawn first so altitude sits on top
  if (spds.length >= 2) {
    const ln = document.createElementNS(NS, 'polyline');
    ln.setAttribute('points', pts
      .filter(p => p.spd != null && !isNaN(p.spd))
      .map(p => `${xOf(p.ts).toFixed(1)},${ySpd(p.spd).toFixed(1)}`)
      .join(' ')
    );
    ln.setAttribute('fill', 'none');
    ln.setAttribute('stroke', '#4f8ef7');
    ln.setAttribute('stroke-width', '1.5');
    ln.setAttribute('stroke-linecap', 'round');
    ln.setAttribute('stroke-linejoin', 'round');
    svg.appendChild(ln);
  }

  // Altitude line (purple)
  if (alts.length >= 2) {
    const ln = document.createElementNS(NS, 'polyline');
    ln.setAttribute('points', pts
      .filter(p => p.alt != null && !isNaN(p.alt))
      .map(p => `${xOf(p.ts).toFixed(1)},${yAlt(p.alt).toFixed(1)}`)
      .join(' ')
    );
    ln.setAttribute('fill', 'none');
    ln.setAttribute('stroke', '#a855f7');
    ln.setAttribute('stroke-width', '1.5');
    ln.setAttribute('stroke-linecap', 'round');
    ln.setAttribute('stroke-linejoin', 'round');
    svg.appendChild(ln);
  }

  // Min / max numeric labels — corners only, palette colors
  const fmtAltShort = a => a >= 18000 ? `FL${Math.round(a/100)}` : `${Math.round(a/100)*100}`;
  const altLbl = document.createElementNS(NS, 'text');
  altLbl.setAttribute('x', padL);
  altLbl.setAttribute('y', 11);
  altLbl.setAttribute('class', 'd-chart-lbl');
  altLbl.setAttribute('fill', '#a855f7');
  altLbl.textContent = alts.length ? `${fmtAltShort(aMax)}` : '';
  svg.appendChild(altLbl);

  const spdLbl = document.createElementNS(NS, 'text');
  spdLbl.setAttribute('x', W - padR);
  spdLbl.setAttribute('y', 11);
  spdLbl.setAttribute('text-anchor', 'end');
  spdLbl.setAttribute('class', 'd-chart-lbl');
  spdLbl.setAttribute('fill', '#4f8ef7');
  spdLbl.textContent = spds.length ? `${Math.round(sMax)}kt` : '';
  svg.appendChild(spdLbl);
}

/* ── Waypoint progress list ─────────────────────────────────────────────────── */
function renderWaypoints(f) {
  const section   = document.getElementById('d-waypoints-section');
  const container = document.getElementById('d-waypoints');
  if (!section || !container) return;

  if (!flightPlanWPs || flightPlanWPs.length < 1 || !f) {
    section.style.display = 'none';
    return;
  }
  section.style.display = '';

  // Find the index of the closest waypoint to the plane
  let closestIdx = 0, best = Infinity;
  for (let i = 0; i < flightPlanWPs.length; i++) {
    const w = flightPlanWPs[i];
    const dy = w.lat - f.latitude;
    const dx = w.lng - f.longitude;
    const d  = dy * dy + dx * dx;
    if (d < best) { best = d; closestIdx = i; }
  }
  // Treat closest-or-earlier as passed; the very next one is "NEXT"
  const nextIdx = Math.min(closestIdx + 1, flightPlanWPs.length - 1);

  container.innerHTML = flightPlanWPs.map((w, i) => {
    const dist = haversineNm(f.latitude, f.longitude, w.lat, w.lng);
    const brng = bearingDeg(f.latitude, f.longitude, w.lat, w.lng);
    const cls  = (i < nextIdx) ? 'passed' : (i === nextIdx ? 'next' : 'future');
    const pill = (cls === 'next') ? '<span class="wp-next-pill">NEXT</span>' : '';
    return `<div class="wp-item ${cls}">
      <div class="wp-dot"></div>
      <div class="wp-name">${esc(w.name)}</div>
      <div class="wp-dist">${Math.round(dist).toLocaleString()} NM</div>
      <div class="wp-brng">${Math.round(brng).toString().padStart(3,'0')}°</div>
      ${pill}
    </div>`;
  }).join('');
}

function closeDetail() {
  selectedId      = null;
  selectedTrail   = [];
  flightPlanWPs   = null;
  flightPlanState = 'idle';
  document.getElementById('right-sb').classList.remove('open');
  clearPathLayers();
  updateMarkers();
  buildList();
}

/* ── Controls ────────────────────────────────────────────────────────────────── */
function filterSearch(val) {
  searchQuery = val.trim();
  buildList();
}

function setFilter(btn, server) {
  currentServer = server;
  document.querySelectorAll('.sf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // If the currently selected flight isn't on the new server, deselect it
  // so we don't leave orphaned trails on the map.
  if (selectedId && flightData[selectedId] && flightData[selectedId].server !== server && server !== 'all') {
    closeDetail();
  }

  // Remove all markers and rebuild for new server
  for (const id of Object.keys(markers)) {
    map?.removeLayer(markers[id]);
    delete markers[id];
  }
  buildList();
  updateMarkers();
}

const SPEED_CYCLE = ['kn', 'mph', 'km/h'];
function cycleSpeed() {
  speedUnit = SPEED_CYCLE[(SPEED_CYCLE.indexOf(speedUnit) + 1) % SPEED_CYCLE.length];
  document.getElementById('speed-btn').textContent = speedUnit;
  buildList();
  if (selectedId && flightData[selectedId]) renderDetail(flightData[selectedId]);
}

/* ── Loading overlay ─────────────────────────────────────────────────────────── */
function hideLoading() {
  document.getElementById('map-loading')?.classList.add('hidden');
}

/* ── Load external plane icon (plane.svg) ────────────────────────────────────── */
async function loadPlaneSvg() {
  try {
    const res = await fetch('plane.svg');
    if (!res.ok) return;                    // file not present — fall back to PLANE_PATH
    let raw = await res.text();
    // Strip hardcoded fill colors so CSS `color` value drives tinting via currentColor.
    // Use \b (word boundary) so we catch fill: at start of style value (after ") as well.
    raw = raw.replace(/\bfill="(?!none)[^"]*"/gi,   'fill="currentColor"');
    raw = raw.replace(/\bfill:\s*(?!none)[^;}" ]+/gi, 'fill:currentColor');
    planeSvg = raw;
  } catch { /* silently fall back to built-in path */ }
}

/* ── WebSocket ───────────────────────────────────────────────────────────────── */
function handleFlights(flights) {
  const now = Date.now();
  for (const f of flights || []) {
    const id = String(f.flightId);
    flightData[id]     = f;
    flightLastSeen[id] = f.ts || now;
    if (f.latitude != null && f.longitude != null) {
      (liveTrails[id] = liveTrails[id] || []).push([f.latitude, f.longitude]);
      if (liveTrails[id].length > TRAIL_MAX) liveTrails[id].shift();

      // If this is the selected flight, also extend selectedTrail so the
      // trail grows in real time between full /path refetches.
      if (id === selectedId && selectedTrail.length) {
        const last = selectedTrail[selectedTrail.length - 1];
        if (Math.abs(last.lat - f.latitude)  >= 1e-5
         || Math.abs(last.lng - f.longitude) >= 1e-5) {
          selectedTrail.push({
            lat: f.latitude, lng: f.longitude,
            alt: f.altitude, spd: f.speed,
            vs:  f.verticalSpeed, track: f.track, ts: f.ts || now,
          });
        }
      }
    }
  }
  updateMarkers();   // this also calls updateTrails at the end
  buildList();
  if (selectedId && flightData[selectedId]) renderDetail(flightData[selectedId]);
  hideLoading();
}

let ws, wsRetry = 0;

function connectWS() {
  isOnline = false;
  try { ws = new WebSocket(WS_URL); } catch { retry(); return; }
  ws.onopen    = () => { wsRetry = 0; isOnline = true; };
  ws.onclose   = retry;
  ws.onerror   = () => ws.close();
  ws.onmessage = ({ data }) => {
    try {
      const m = JSON.parse(data);
      if (m.type === 'snapshot' || m.type === 'update') handleFlights(m.flights);
    } catch {}
  };
}

function retry() {
  isOnline = false;
  setTimeout(connectWS, Math.min(1000 * 2 ** wsRetry++, 30_000));
}

/* ── Boot ────────────────────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  initMap();
  loadPlaneSvg();   // async — loads plane.svg if present, no-ops silently if missing
  connectWS();
  setInterval(cleanStale, 60_000);
});
</script>
